name: Automated X Poster

on:
  schedule:
    # Runs at 00:00, 06:00, and 12:00 UTC (which is 08:00, 14:00, and 20:00 local time UTC+8)
    - cron: '0 0,6,12 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required so the action can push the updated tips_state.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-genai pillow playwright python-dotenv tweepy requests

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run posting script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_COOKIE_AUTH_TOKEN: ${{ secrets.X_COOKIE_AUTH_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          LINKEDIN_COOKIE_LI_AT: ${{ secrets.LINKEDIN_COOKIE_LI_AT }}
        run: |
          python run_once.py
          python linkedin_generator.py

      - name: Commit and push updated state
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add tips_state.json linkedin_state.json
          # Only commit if tips_state.json or linkedin_state.json has changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update posted state (X and LinkedIn)" && git push)
